name: Tests

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "**"

env:
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE: ${{ github.repository }}

jobs:
  check-lint:
    name: Check lint
    runs-on: ubuntu-latest
    container: debian:bookworm
    permissions:
      contents: read
    env:
      PIP_CACHE_DIR: "/.pip"
    steps:
        # 6.0.2
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Cache pip downloads
        # 5.0.5
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: /.pip
          key: pip-${{ runner.os }}-lint-1
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Prime mypy cache
        # 5.0.5
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('**/*.py') }}
          restore-keys: |
            mypy-${{ runner.os }}-

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            $(xargs < dependencies.apt.txt) \
            python3-setuptools \
            python3-venv

      - name: Install lint tools
        run: |
          python3 -m venv venv
          . venv/bin/activate

          # Bump cache key above when changing versions
          pip install 'black==26.5.0' 'flake8==7.3.0'

      - name: Run black
        run: |
          . venv/bin/activate
          black --check --diff --extend-exclude '/venv/' .

      - name: Run flake8
        run: |
          . venv/bin/activate
          flake8 --extend-exclude=./venv

      - name: Install mypy
        run: |
          python3 -m venv --system-site-packages mypyvenv
          . mypyvenv/bin/activate

          # Bump cache key above when changing versions
          pip install 'mypy==2.1.0' 'lxml-stubs==0.5.1'

      - name: Run mypy check
        run: |
          . mypyvenv/bin/activate

          mypy \
            --install-types \
            --non-interactive \
            src

      - name: Save mypy cache
        # 5.0.5
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        if: github.repository == 'flathub-infra/flatpak-external-data-checker' && github.ref == 'refs/heads/master'
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('**/*.py') }}

      - name: Save pip downloads cache
        # 5.0.5
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        if: github.repository == 'flathub-infra/flatpak-external-data-checker' && github.ref == 'refs/heads/master'
        with:
          path: /.pip
          key: pip-${{ runner.os }}-lint-1

  build-and-test-container:
    name: Build and test container
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
        # 6.0.2
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        # 4.0.0
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build container
        id: docker_build
        # 7.1.0
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ env.DOCKER_IMAGE }}:build
          push: false
          load: true
          cache-from: type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:latest
          cache-to: type=inline

      - name: Run tests in container
        run: |
          docker run -v $PWD:$PWD -w $PWD --entrypoint bash "$DOCKER_IMAGE":build -c \
          "apt-get install python3-coverage && python3 -m coverage run -m unittest discover --verbose --buffer"

      - name: Cache pip downloads
        # 5.0.5
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.pip
          key: pip-${{ runner.os }}-coveralls-4.1.0
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Submit code coverage to Coveralls.io
        if: github.event.pull_request.head.repo.fork == false
        env:
          PIP_CACHE_DIR: "~/.pip"
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -m venv venv
          . venv/bin/activate
          # Bump cache key above
          pip install 'coveralls==4.1.0'
          coveralls

      - name: Login to registry
        if: github.event_name != 'pull_request'
        # 4.1.0
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to registry
        if: github.event_name != 'pull_request'
        # 7.1.0
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:latest
          push: true

      - name: Login to ghcr.io using Flathub credentials
        if: github.event_name != 'pull_request'
        # 4.1.0
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ secrets.FLATHUB_ORG_USER }}
          password: ${{ secrets.FLATHUB_ORG_TOKEN }}

      - name: Push image to the old location
        if: github.event_name != 'pull_request'
        # 7.1.0
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ./Dockerfile
          tags: ghcr.io/flathub/flatpak-external-data-checker:latest
          push: true

      - name: Save pip downloads cache
        # 5.0.5
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        if: github.repository == 'flathub-infra/flatpak-external-data-checker' && github.ref == 'refs/heads/master'
        with:
          path: ~/.pip
          key: pip-${{ runner.os }}-coveralls-4.1.0
